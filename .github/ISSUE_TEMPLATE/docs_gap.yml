name: Documentation gap
description: Report missing, confusing, or stale documentation
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: textarea
    id: gap
    attributes:
      label: Gap
      description: What is missing or unclear?
    validations:
      required: true
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Link or path if known.
    validations:
      required: false
  - type: textarea
    id: done
    attributes:
      label: Definition of done
    validations:
      required: true
