name: Feature request
description: Propose a new loop, verifier, prompt, example, or integration
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should improve?
    validations:
      required: true
  - type: textarea
    id: plan
    attributes:
      label: Proposed plan
      description: Describe the loop, files, and verification you expect.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
    validations:
      required: true
